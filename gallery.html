<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Gallery | JAVEED WORKS</title>

    <link rel="stylesheet"
        href="styles.css">

</head>

<body>

    <section>

        <div class="container">

            <a href="index.html"
                class="btn btn-secondary">

                ← Back Home

            </a>

            <br><br>

            <div class="section-header">

                <h1 id="galleryTitle"
                    class="section-title">

                    Gallery

                </h1>

                <div class="title-underline"></div>

            </div>

            <div class="gallery-grid"
                id="galleryGrid">

            </div>

        </div>

    </section>

    <script>

        const params =
            new URLSearchParams(window.location.search);

        const category =
            params.get("category");

        const galleryTitle =
            document.getElementById("galleryTitle");

        const galleryGrid =
            document.getElementById("galleryGrid");

        const titleMap = {

            floor: "Flooring Work",

            granite: "Granite Work"

        };

        galleryTitle.innerText =
            titleMap[category] || "Gallery";

        const galleryConfig = {

            floor: {
                folder: "images/flooring",
                prefix: "f",
                count: 32
            },

            granite: {
                folder: "images/granite",
                prefix: "g",
                count: 12
            }

        };

        const config =
            galleryConfig[category];

        for (let i = 1; i <= config.count; i++) {

            const item =
                document.createElement("div");

            item.className = "gallery-item";

            item.innerHTML = `
                <img src="${config.folder}/${config.prefix}${i}.jpg">
            `;

            galleryGrid.appendChild(item);

        }

    </script>

</body>

</html>
